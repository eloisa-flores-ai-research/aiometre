<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOMetre</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Chewy&family=Lato:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: url('fondo.png') no-repeat center center fixed; background-size: cover; font-family: 'Lato', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px; color: white; }
    .header { text-align: center; margin-bottom: 15px; padding-top: 15px; }
    .logo { font-family: 'Chewy', cursive; font-size: 4.2em; color: #c52d0e; text-shadow: -2px -2px 0 #ffde59, 2px -2px 0 #ffde59, -2px 2px 0 #ffde59, 2px 2px 0 #ffde59, 3px 3px 4px rgba(0,0,0,0.7); letter-spacing: 1px; margin-bottom: -10px; }
    .tagline { font-size: 1.1em; color: #ffde59; letter-spacing: 2px; margin-top: 8px; font-weight: 300; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
    .meter-container { width: 280px; margin: 10px auto; text-align: center; }
    .meter-label { font-size: 0.9em; color: #00ffc1; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
    .meter-bar { height: 6px; background: rgba(255,255,255,0.4); border-radius: 10px; overflow: hidden; width: 100%; }
    .meter-fill { height: 100%; width: 50%; background: linear-gradient(90deg, #ffde59, #ffeb3b); border-radius: 10px; transition: width 1s ease; }
    .meter-value { font-size: 0.9em; color: #ffde59; margin-top: 8px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.7); }
    .avatar-container { position: relative; width: 180px; height: 120px; margin: 5px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .avatar-emoji { font-size: 60px; position: relative; z-index: 2; margin-bottom: 5px; }
    .status-text { font-size: 1em; color: #ffde59; letter-spacing: 1px; font-style: italic; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); margin-top: -5px; }
    .stars { position: absolute; font-size: 20px; color: #ffde59; z-index: 3; animation: twinkle 2s ease-in-out infinite alternate; }
    .star-left { left: -30px; top: 20px; }
    .star-right { right: -30px; top: 20px; }
    @keyframes twinkle { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 1; } }
    .chat-area { width: 100%; max-width: 480px; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 12px; max-height: 240px; scrollbar-width: none; margin-top: 5px; }
    .chat-area::-webkit-scrollbar { display: none; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.88em; line-height: 1.5; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.aiometre { align-self: flex-start; border-bottom-left-radius: 4px; background: rgba(46,125,50,0.8); border: 2px solid #00ffc1; color: white; }
    .message.user { background: linear-gradient(135deg, #c52d0e, #ff8a65); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message-sender { font-size: 0.7em; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; opacity: 0.9; text-transform: uppercase; color: #ffde59; }
    .options-area { width: 100%; max-width: 480px; display: flex; flex-wrap: wrap; gap: 8px; padding: 5px 0; justify-content: center; }
    .option-btn { background: linear-gradient(135deg, #c52d0e, #ff6b35); border: 2px solid #ff8a65; border-radius: 20px; padding: 8px 16px; color: white; font-family: 'Lato', sans-serif; font-size: 0.85em; cursor: pointer; transition: all 0.2s; }
    .option-btn:hover { background: linear-gradient(135deg, #ffde59, #fff59d); color: #c52d0e; border-color: #ffde59; transform: scale(1.05); }
    .option-btn.selected { background: linear-gradient(135deg, #ffde59, #fff59d); color: #c52d0e; border-color: #ffde59; }
    .input-area { width: 100%; max-width: 480px; display: flex; gap: 10px; align-items: center; padding: 12px 0; border-top: 1px solid rgba(255,222,89,0.4); margin-top: 8px; }
    .input-box { flex: 1; background: rgba(0,0,0,0.7); border: 1.5px solid #ffde59; border-radius: 24px; padding: 12px 18px; font-size: 0.88em; font-family: 'Lato', sans-serif; outline: none; color: #ffde59; }
    .input-box::placeholder { color: rgba(255,222,89,0.6); }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #c52d0e, #ff8a65); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(197,45,14,0.4); }
    .vol-btn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #c52d0e, #ff4444); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(197,45,14,0.4); font-size: 18px; }
    .mic-btn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ffde59, #fff59d); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(255,222,89,0.4); font-size: 20px; }
    .mic-btn.recording { background: linear-gradient(135deg, #ff4444, #c52d0e); animation: pulse-mic 1s ease-in-out infinite; }
    @keyframes pulse-mic { 0%, 100% { box-shadow: 0 4px 12px rgba(255,68,68,0.4); } 50% { box-shadow: 0 4px 24px rgba(255,68,68,0.8); transform: scale(1.1); } }
    .signature { position: fixed; bottom: 1rem; left: 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .created-by { font-size: 13px; color: #ffde59; }
    .author { font-size: 12px; color: white; display: flex; align-items: center; gap: 0.4rem; }
    .author-photo { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">AIOmetre</div>
    <div class="tagline">YOUR HUMAN CONNECTION COMPANION</div>
  </div>
  <div class="meter-container">
    <div class="meter-label">CONNECTION INDEX</div>
    <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
    <div class="meter-value" id="meterValue">FEELING BALANCED</div>
  </div>
  <div class="avatar-container">
    <div class="stars star-left">✨</div>
    <div class="avatar-emoji" id="avatarEmoji">😊</div>
    <div class="stars star-right">✨</div>
    <div class="status-text" id="statusText">HERE FOR YOU</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="options-area" id="optionsArea">
    <button id="startBtn" style="background:linear-gradient(135deg,#00ffc1,#00b894);border:none;border-radius:30px;padding:14px 32px;color:#1a1a1a;font-family:'Chewy',cursive;font-size:1.4em;cursor:pointer;box-shadow:0 4px 18px rgba(0,255,193,0.4);letter-spacing:2px;">✨ Click Here to Start</button>
  </div>
  <div class="input-area">
    <button class="vol-btn" id="volBtn" title="Toggle voice">🔊</button>
    <button class="mic-btn" id="micBtn" title="Hold to talk">🎙</button>
    <input class="input-box" id="inputBox" type="text" placeholder="or type here..."/>
    <button class="send-btn" id="sendBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
  <div class="signature">
    <div class="created-by">Created by</div>
    <div class="author">
      <img src="eloisa_flores_foto.png" alt="Eloisa Flores" class="author-photo">
      Eloisa Flores
    </div>
  </div>
  <script>
    const chatArea = document.getElementById('chatArea');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const volBtn = document.getElementById('volBtn');
    const optionsArea = document.getElementById('optionsArea');
    const avatarEmoji = document.getElementById('avatarEmoji');
    const statusText = document.getElementById('statusText');
    const meterFill = document.getElementById('meterFill');
    const meterValue = document.getElementById('meterValue');
    const sessionId = 'session_' + Date.now();
    let voiceEnabled = true;
    let googleVoice = null;
    let recognition = null;
    let accumulated = '';

    volBtn.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      volBtn.textContent = voiceEnabled ? '🔥' : '🔇';
      if (!voiceEnabled) window.speechSynthesis.cancel();
      else loadGoogleVoice();
    });

    function loadGoogleVoice(callback) {
      const tryLoad = () => {
        const voices = window.speechSynthesis.getVoices();
        googleVoice = voices.find(v => v.name === 'Google US English') ||
                      voices.find(v => v.name.includes('Google') && v.lang === 'en-US') ||
                      voices.find(v => v.lang === 'en-US');
        if (callback) callback();
      };
      if (window.speechSynthesis.getVoices().length > 0) tryLoad();
      else window.speechSynthesis.onvoiceschanged = tryLoad;
    }

    function speak(text, options) {
      text = text.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');
      if (!voiceEnabled || !('speechSynthesis' in window)) {
        if (options && options.length > 0) showOptions(options);
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = 0.95;
      utter.pitch = 1.1;
      const doSpeak = () => {
        if (googleVoice) utter.voice = googleVoice;
        utter.onstart = () => { statusText.textContent = 'SPEAKING... 💬'; avatarEmoji.textContent = '😎'; };
        utter.onend = () => {
          statusText.textContent = 'HERE FOR YOU';
          avatarEmoji.textContent = '😊';
          if (options && options.length > 0) showOptions(options);
        };
        window.speechSynthesis.speak(utter);
      };
      if (googleVoice) doSpeak();
      else loadGoogleVoice(doSpeak);
    }

    function updateMeter(s) {
      const pct = Math.round((1 - s/10) * 100);
      meterFill.style.width = pct + '%';
      if (s <= 3) { meterValue.textContent = 'WELL CONNECTED 💜'; avatarEmoji.textContent = '😄'; }
      else if (s <= 6) { meterValue.textContent = 'FEELING BALANCED'; avatarEmoji.textContent = '😊'; }
      else { meterValue.textContent = 'NEEDS CONNECTION 🤍'; avatarEmoji.textContent = '🥺'; }
    }

    function showOptions(options) {
      optionsArea.innerHTML = '';
      if (!options || options.length === 0) return;
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          setTimeout(() => sendMessageToAPI(opt), 200);
        });
        optionsArea.appendChild(btn);
      });
    }

    function addMessage(text, sender) {
      const typing = document.querySelector('.typing');
      if (typing) typing.remove();
      const msg = document.createElement('div');
      msg.className = 'message ' + sender;
      const label = document.createElement('div');
      label.className = 'message-sender';
      label.textContent = sender === 'aiometre' ? 'AIOmetre' : 'You';
      msg.appendChild(label);
      msg.appendChild(document.createTextNode(text));
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
      const t = document.createElement('div');
      t.className = 'message aiometre typing';
      t.innerHTML = '<div class="message-sender">AIOmetre</div>...';
      chatArea.appendChild(t);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function handleReply(data) {
      addMessage(data.reply, 'aiometre');
      if (data.score !== undefined) updateMeter(data.score);
      const reply = data.reply || '';
      if (reply.includes('Want me to take you out of the matrix')) {
        speak(reply, []);
        const checkMatrix = setInterval(() => {
          if (!window.speechSynthesis.speaking) {
            clearInterval(checkMatrix);
            showMatrixPills();
          }
        }, 300);
      } else if (reply.includes('Another one?')) {
        speak(reply, ['Hell yes 🔥', 'I need a break', 'Hasta la vista, Baby!']);
      } else if (reply.includes('Ready for your next mission')) {
        speak(reply, ['Hell yes 🔥', 'Give me a sec', 'Hasta la vista, Baby!']);
      } else {
        speak(reply, data.options);
      }
      statusText.textContent = 'HERE FOR YOU';
    }

    function silentSend(text) {
      if (!text || !text.trim()) return;
      optionsArea.innerHTML = '';
      showTyping();
      statusText.textContent = 'THINKING... 🌿';
      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text.trim(), session_id: sessionId })
      })
      .then(res => res.json())
      .then(data => { handleReply(data); })
      .catch(() => {
        addMessage('Connection error. Try again.', 'aiometre');
        statusText.textContent = 'HERE FOR YOU';
      });
    }

    function sendMessageToAPI(text) {
      if (!text || !text.trim()) return;
      addMessage(text, 'user');
      inputBox.value = '';
      optionsArea.innerHTML = '';
      showTyping();
      statusText.textContent = 'THINKING... 🌿';
      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text.trim(), session_id: sessionId })
      })
      .then(res => res.json())
      .then(data => { handleReply(data); })
      .catch(() => {
        addMessage('Connection error. Try again.', 'aiometre');
        statusText.textContent = 'HERE FOR YOU';
      });
    }

    sendBtn.addEventListener('click', () => sendMessageToAPI(inputBox.value));
    inputBox.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessageToAPI(inputBox.value); });

    micBtn.addEventListener('mousedown', () => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { addMessage('Voice not supported. Use Chrome.', 'aiometre'); return; }
      accumulated = '';
      recognition = new SR();
      recognition.lang = 'en-US';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        let final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript;
        }
        if (final) accumulated += ' ' + final;
        statusText.textContent = 'LISTENING... 🎙️';
      };
      recognition.onerror = () => { micBtn.classList.remove('recording'); statusText.textContent = 'HERE FOR YOU'; };
      recognition.start();
      micBtn.classList.add('recording');
      statusText.textContent = 'HOLD & SPEAK... 🎙️';
    });

    micBtn.addEventListener('mouseup', () => {
      if (recognition) recognition.stop();
      micBtn.classList.remove('recording');
      statusText.textContent = 'HERE FOR YOU';
      setTimeout(() => { if (accumulated.trim()) sendMessageToAPI(accumulated.trim()); }, 300);
    });

    micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); micBtn.dispatchEvent(new Event('mousedown')); });
    micBtn.addEventListener('touchend', (e) => { e.preventDefault(); micBtn.dispatchEvent(new Event('mouseup')); });

    updateMeter(5);

    function showMatrixPills() {
      const area = document.getElementById('optionsArea');
      area.innerHTML = '';
      const red = document.createElement('button');
      red.textContent = '🔴 Red Pill';
      red.style.cssText = 'background:radial-gradient(ellipse at center,#ff4444,#8b0000);border:2px solid #ff6666;border-radius:50px;padding:12px 28px;color:white;font-family:Lato,sans-serif;font-size:1em;font-weight:bold;cursor:pointer;box-shadow:0 4px 20px rgba(255,68,68,0.6);letter-spacing:1px;';
      red.addEventListener('click', () => {
        area.innerHTML = '';
        addMessage('Red Pill', 'user');
        silentSend('RED PILL');
      });
      const blue = document.createElement('button');
      blue.textContent = '🔵 Blue Pill';
      blue.style.cssText = 'background:radial-gradient(ellipse at center,#4488ff,#00008b);border:2px solid #6699ff;border-radius:50px;padding:12px 28px;color:white;font-family:Lato,sans-serif;font-size:1em;font-weight:bold;cursor:pointer;box-shadow:0 4px 20px rgba(68,136,255,0.6);letter-spacing:1px;';
      blue.addEventListener('click', () => {
        area.innerHTML = '';
        addMessage('Blue Pill', 'user');
        silentSend('BLUE PILL');
      });
      area.appendChild(red);
      area.appendChild(blue);
    }

    function showYesNo() {
      const area = document.getElementById('optionsArea');
      area.innerHTML = '';
      const yes = document.createElement('button');
      yes.className = 'option-btn';
      yes.textContent = 'Yes 🙌';
      yes.addEventListener('click', () => {
        area.innerHTML = '';
        silentSend("skip intro and start questions directly with Q1");
      });
      const no = document.createElement('button');
      no.className = 'option-btn';
      no.textContent = 'No';
      no.addEventListener('click', () => {
        area.innerHTML = '';
        const byeText = 'Hasta la vista, Baby!';
        addMessage(byeText + ' 👋', 'aiometre');
        speak(byeText);
        statusText.textContent = 'HERE FOR YOU';
        const comeback = document.createElement('button');
        comeback.className = 'option-btn';
        comeback.textContent = '✨ Get me back to AIOmetre';
        comeback.style.background = 'linear-gradient(135deg,#00ffc1,#00b894)';
        comeback.style.color = '#1a1a1a';
        comeback.style.fontWeight = 'bold';
        comeback.addEventListener('click', () => {
          area.innerHTML = '';
          silentSend("skip intro and start questions directly with Q1");
        });
        area.appendChild(comeback);
      });
      area.appendChild(yes);
      area.appendChild(no);
    }

    document.getElementById('startBtn').addEventListener('click', function() {
      this.style.background = 'linear-gradient(135deg,#ffde59,#fff59d)';
      this.style.color = '#c52d0e';
      this.disabled = true;
      loadGoogleVoice(() => {
        const welcomeText = "Hey! I am AIOmetre, your human connection companion. Please answer 4 quick questions so I can get to know you better. Can we start?";
        const utter = new SpeechSynthesisUtterance(welcomeText);
        utter.lang = 'en-US';
        utter.rate = 0.95;
        utter.pitch = 1.1;
        if (googleVoice) utter.voice = googleVoice;
        utter.onstart = () => {
          statusText.textContent = 'SPEAKING... 💬';
          avatarEmoji.textContent = '😎';
          document.getElementById('optionsArea').innerHTML = '';
          addMessage("Hey! I am AIOmetre, your human connection companion. Please answer 4 quick questions so I can get to know you better. Can we start?", 'aiometre');
        };
        utter.onend = () => {
          statusText.textContent = 'HERE FOR YOU';
          showYesNo();
        };
        window.speechSynthesis.speak(utter);
      });
    });
  </script>
</body>
</html>
